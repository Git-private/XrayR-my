name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  opencode:
    if: |
      contains(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, '/opencode')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
       - name: Checkout repository
         uses: actions/checkout@v6
         with:
           fetch-depth: 1
           persist-credentials: false

       - name: Run OpenCode
         uses: anomalyco/opencode/github@latest
         env:
           ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
           OPENCODE_CONFIG_CONTENT: '{"provider":{"zhipu":{"name":"Zhipu GLM","api":"https://open.bigmodel.cn/api/coding/paas/v4","npm":"@ai-sdk/openai-compatible","env":["ZHIPU_API_KEY"],"models":{"glm-5.1":{"name":"GLM 5.1"}}}}}'
         with:
           model: zhipu/glm-5.1
